<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Task Manager</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f7fb;
        padding: 20px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 18px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #222;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      label {
        font-size: 14px;
        font-weight: bold;
        color: #333;
      }

      select,
      textarea,
      input {
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .task-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }

      .task-btn {
        border: none;
        background: #e9f0ff;
        color: #1456d9;
        padding: 10px 14px;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 13px;
      }

      .task-btn:hover {
        background: #d9e5ff;
      }

      .add-btn {
        margin-top: 20px;
        border: none;
        background: #1456d9;
        color: white;
        padding: 13px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
      }

      .add-btn:hover {
        background: #003eb5;
      }

      .task-list {
        margin-top: 35px;
      }

      .task-card {
        background: #f9fbff;
        border-left: 5px solid #1456d9;
        padding: 18px;
        border-radius: 14px;
        margin-bottom: 15px;
      }

      .task-card h3 {
        margin-bottom: 10px;
        color: #1456d9;
      }

      .meta {
        font-size: 13px;
        color: #666;
        margin-bottom: 10px;
      }

      .delete-btn {
        margin-top: 12px;
        border: none;
        background: crimson;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      .delete-btn:hover {
        background: darkred;
      }

      @media (max-width: 600px) {
        .container {
          padding: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>School Task Creation App</h1>

      <div class="grid">
        <div class="field">
          <label>Select Category</label>

          <select id="categorySelect">
            <option value="">Choose Category</option>
          </select>
        </div>

        <div class="field">
          <label>Task Owner</label>

          <!-- AUTO SELECTED -->
          <input
            type="text"
            id="taskOwner"
            readonly
            placeholder="Owner auto selected"
          />
        </div>
      </div>

      <div style="margin-top: 25px">
        <label style="font-weight: bold"> Predefined Tasks </label>

        <div class="task-buttons" id="taskButtonsContainer"></div>
      </div>

      <div class="field" style="margin-top: 25px">
        <label>Task Description</label>

        <textarea
          id="taskDescription"
          placeholder="Select predefined task OR write manual task here..."
        ></textarea>
      </div>

      <button class="add-btn" id="addTaskBtn">Add Task</button>

      <div class="task-list" id="taskList"></div>
    </div>

    <script>
      const TASK_MASTER = {
        Plumbing: {
          owner: "Ramesh",
          tasks: [
            "Repair hostel bathroom tap",
            "Check water leakage",
            "Pipeline checking near kitchen",
            "Water tank cleaning",
          ],
        },

        Teaching: {
          owner: "Mahesh",
          tasks: [
            "Take Maths class",
            "Science practical session",
            "Prepare weekly test",
            "Attendance checking",
          ],
        },

        "Student Care": {
          owner: "Rahul",

          tasks: [
            "Student counselling",
            "Health checkup follow-up",
            "Discipline monitoring",
            "Parent meeting",
          ],
        },

        Hostel: {
          owner: "Suresh",

          tasks: [
            "Room inspection",
            "Mess cleanliness checking",
            "Hostel attendance",
            "Electricity checking",
          ],
        },

        Maintenance: {
          owner: "Vikas",

          tasks: [
            "Fan repair checking",
            "Light checking",
            "Furniture inspection",
            "Classroom maintenance",
          ],
        },
      };

      // =========================================
      // ELEMENTS
      // =========================================

      const categorySelect = document.getElementById("categorySelect");

      const taskButtonsContainer = document.getElementById(
        "taskButtonsContainer",
      );

      const taskDescription = document.getElementById("taskDescription");

      const taskOwner = document.getElementById("taskOwner");

      const taskList = document.getElementById("taskList");

      // =========================================
      // LOAD CATEGORY DROPDOWN
      // =========================================

      Object.keys(TASK_MASTER).forEach((category) => {
        const option = document.createElement("option");

        option.value = category;

        option.textContent = category;

        categorySelect.appendChild(option);
      });

      // =========================================
      // CATEGORY CHANGE
      // =========================================

      categorySelect.addEventListener("change", () => {
        const selectedCategory = categorySelect.value;

        taskButtonsContainer.innerHTML = "";

        taskDescription.value = "";

        taskOwner.value = "";

        if (!selectedCategory) return;

        // CATEGORY DATA

        const categoryData = TASK_MASTER[selectedCategory];

        // AUTO OWNER SELECT

        taskOwner.value = categoryData.owner;

        // LOAD TASKS

        categoryData.tasks.forEach((task) => {
          const button = document.createElement("button");

          button.className = "task-btn";

          button.textContent = task;

          button.addEventListener("click", () => {
            // SINGLE TASK REPLACE

            taskDescription.value = task;
          });

          taskButtonsContainer.appendChild(button);
        });
      });

      // =========================================
      // ADD TASK
      // =========================================

      document.getElementById("addTaskBtn").addEventListener("click", () => {
        const category = categorySelect.value;

        const owner = taskOwner.value;

        const description = taskDescription.value.trim();

        if (!category) {
          alert("Please select category");

          return;
        }

        if (!description) {
          alert("Please enter task");

          return;
        }

        const taskCard = document.createElement("div");

        taskCard.className = "task-card";

        taskCard.innerHTML = `

          <h3>${category}</h3>

          <div class="meta">
            Task Owner : ${owner}
          </div>

          <div>
            ${description.replace(/\n/g, "<br>")}
          </div>

          <button class="delete-btn">
            Delete
          </button>

        `;

        // DELETE BUTTON

        taskCard.querySelector(".delete-btn").addEventListener("click", () => {
          taskCard.remove();
        });

        taskList.prepend(taskCard);

        // RESET DESCRIPTION

        taskDescription.value = "";
      });
    </script>
  </body>
</html>
