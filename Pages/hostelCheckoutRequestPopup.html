<!doctype html>
<div class="popup" id="hostelCheckoutRequestPopup">
  <div class="popup-content scrollable-content">
    <div class="refresh-button-container">
      <button class="refresh-btn-new" onclick="hostelCheckoutRequestRefClick()">
        <span class="refresh-text">Refresh</span>
        <span class="refresh-icon">⟳</span>
      </button>
    </div>

    <div class="popup-title-box"></div>

    <div class="reason-box">
      <label class="reason-label">Purpose :</label>

      <select
        id="purposeDropdown"
        class="custom-duration-dropdown"
        onchange="HANDLE_PURPOSE_CHANGE(this.value)"
      >
        <option value="">Select Purpose</option>
      </select>
    </div>

    <!--  DURATION -->
    <div class="reason-box">
      <label class="reason-label">Duration :</label>

      <div class="reason-box-dual-duration-row">
        <!-- TYPE -->
        <select
          id="durationTypeDropdown"
          class="custom-duration-dropdown half"
          onchange="HANDLE_DURATION_TYPE_CHANGE()"
        >
          <option value="">Select Type</option>
          <option value="day">In Days</option>
          <option value="time">In Hr/Min</option>
        </select>

        <!-- VALUE -->
        <select
          id="specialEntryDuration"
          class="custom-duration-dropdown half"
          onchange="HANDLE_DURATION_CHANGE(this.value)"
        >
          <option value="">Select Duration</option>
        </select>
      </div>
    </div>

    <div
      class="dynamic-dropdown-container disabled"
      id="hostelCheckoutRequest-dynamic-dropdown-container"
    ></div>

    <!-- REASON -->

    <div class="reason-box">
      <label class="reason-label">Reason :</label>
      <textarea
        id="specialEntryReason"
        placeholder="Enter reason here..."
      ></textarea>
    </div>

    <div class="button-row">
      <button
        class="red"
        id="hostelCheckoutRequest-back"
        onclick="hcrBackBtnClick()"
      >
        Back
      </button>
      <button class="blue" onclick="hcrResetBtnClick()">Reset</button>
      <button
        class="green"
        id="hostelCheckoutRequest-submit"
        onclick="hcrEntrySubClick()"
      >
        Proceed
      </button>
    </div>
  </div>
</div>
